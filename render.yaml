services:
  - type: web
    name: xq-backend
    runtime: node
    buildCommand: npm install && JOZ_QUALITY_WRITE_ARTIFACTS=true npm run check:joz-quality
    startCommand: npm start
    healthCheckPath: /api/hello
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DISABLE_FILE_MEMORY
        value: "1"
